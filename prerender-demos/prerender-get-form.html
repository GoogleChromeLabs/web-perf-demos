<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prefetch example</title>
  <link id="favicon" rel="icon" href="./favicon.ico" type="image/x-icon" />


  <script type="speculationrules">
{
  "prerender": [{
    "urls": ["next.html?"],
    "form_submission": true
  }]
}
</script>

</head>
<body>

  <h1>Start page</h1>

  <p><a href="next.html?">This link should be prerender</a></p>
  <form action="next.html" method="GET">
    <button type="submit">Make a GET request to use a prerender</button>
  </form>

  <hr>

  <pre id="output1"></pre>
  <pre id="output2"></pre>

  <hr>

  <p><a href="https://github.com/GoogleChromeLabs/web-perf-demos/tree/main/prerender-demos">View the code on GitHub</a></p>
</body>
</html>
