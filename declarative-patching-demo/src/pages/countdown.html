<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Countdown Demo</title>
    <meta name="description" content="A beautiful, premium countdown demonstration with modern design aesthetics.">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-glow: 0 0 40px rgba(168, 85, 247, 0.4);
            --text-color: #f8fafc;
            --accent-color: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Background decorative elements */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            filter: blur(80px);
            pointer-events: none;
        }

        .blob {
            position: absolute;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 10s ease-in-out infinite alternate;
        }

        .blob-1 {
            top: 20%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: #6366f1;
        }

        .blob-2 {
            bottom: 20%;
            right: 30%;
            width: 400px;
            height: 400px;
            background: #ec4899;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 40px) scale(1.1);
            }
        }

        /* Clock Container */
        .countdown-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 6rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .countdown-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                var(--primary-glow);
        }

        /* Time Display */
        .countdown-display {
            font-size: 8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            line-height: 1;
        }

        .separator {
            color: var(--accent-color);
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            margin: 0 0.1em;
            position: relative;
            top: -5px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Subtext */
        .status-text {
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Interactive Button (Micro-interaction) */
        .action-btn {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .countdown-container {
                padding: 2rem 3rem;
                border-radius: 24px;
            }

            .countdown-display {
                font-size: 5rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="countdown-container" id="countdown-card">
        <div class="countdown-display" id="countdown-display">
            <?start name="countdown">
           Wait for it...
            <?end>
        </div>
        <button class="action-btn" id="stream-button">Stream in some content!!</button>
    </main>

    <script>
        // Interactive logic
        const countdownDisplay = document.getElementById('countdown-display');
        const streamBtn = document.getElementById('stream-button');

        streamBtn.addEventListener('click', () => {
            fetch('/api/countdown?from=10');
        });
    </script>
</body>
</html>
