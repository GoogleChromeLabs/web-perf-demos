<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Lab - Demos & Experiments</title>
    <meta name="description" content="A curated collection of high-performance web demonstrations and cutting-edge experiments.">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --primary-glow: 0 0 50px rgba(99, 102, 241, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #818cf8;
            --accent-gradient: linear-gradient(90deg, #818cf8 0%, #c084fc 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Background decorative elements */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            filter: blur(100px);
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            animation: float 15s ease-in-out infinite alternate;
        }

        .blob-1 {
            top: 10%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: #4f46e5;
        }

        .blob-2 {
            bottom: 10%;
            right: 20%;
            width: 500px;
            height: 500px;
            background: #7c3aed;
            animation-delay: -7s;
        }

        .blob-3 {
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: #db2777;
            animation-delay: -3s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.15); }
        }

        /* Main Container */
        .portal-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 4rem;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        /* Header */
        header {
            margin-bottom: 3.5rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(129, 140, 248, 0.2);
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Demo Section */
        .demos-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .demo-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .demo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .demo-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--accent-color);
            box-shadow: var(--primary-glow),
                        0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }

        .demo-card:hover::before {
            opacity: 0.05;
        }

        .demo-info {
            position: relative;
            z-index: 1;
            text-align: left;
        }

        .demo-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .demo-desc {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .arrow-icon {
            position: relative;
            z-index: 1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
        }

        .demo-card:hover .arrow-icon {
            background: var(--accent-color);
            color: #0f172a;
            transform: translateX(5px);
        }

        /* Footer */
        footer {
            margin-top: 3.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .portal-container {
                padding: 2rem;
                border-radius: 24px;
            }
            h1 {
                font-size: 2.5rem;
            }
            .demo-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="portal-container" id="main-portal">
        <header>
            <h1>Performance Lab</h1>
            <p class="subtitle">A testing ground for modern web performance patterns and demonstrations.</p>
        </header>

        <section class="demos-section" id="demo-list" aria-label="Available Demos">
            <!-- Clock Demo -->
            <a href="clock.html" class="demo-card" id="clock-demo-link">
                <div class="demo-info">
                    <div class="demo-title">
                        <span>🕒</span>
                        <span>Premium Clock Demo</span>
                    </div>
                    <div class="demo-desc">A beautiful, animated clock with live time capabilities.</div>
                </div>
                <div class="arrow-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>

            <!-- Future demos can be added here -->
        </section>

        <footer>
            <p>© 2026 Web Performance Lab</p>
        </footer>
    </main>
</body>
</html>
